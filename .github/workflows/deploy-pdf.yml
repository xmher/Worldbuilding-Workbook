name: Deploy PDF to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'typst/output/workbook.pdf'
      - 'typst/per_section/**'
      - 'docs/**'
      - '.github/workflows/deploy-pdf.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp typst/output/workbook.pdf _site/
          cp typst/per_section/01_geography/01_geography.pdf _site/01_geography.pdf

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
